name: Desplegar Ganadería Pamora en GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar secretos de Firebase
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          missing=""
          [ -z "$FB_API_KEY" ] && missing="$missing FIREBASE_API_KEY"
          [ -z "$FB_AUTH_DOMAIN" ] && missing="$missing FIREBASE_AUTH_DOMAIN"
          [ -z "$FB_PROJECT_ID" ] && missing="$missing FIREBASE_PROJECT_ID"
          if [ -n "$missing" ]; then
            echo "ERROR: Los siguientes secretos faltan en GitHub:$missing"
            echo "Ve a Settings -> Secrets and variables -> Actions en tu repositorio."
            exit 1
          fi
          echo "Secretos de Firebase validados correctamente."
          echo "Dominio de auth: $FB_AUTH_DOMAIN"

      - name: Inyectar Firebase config en index.html
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FB_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          def clean(val):
              return val.replace('⚠️', '').strip()

          config_script = """<script>
          window.FIREBASE_CONFIG = {
            apiKey: "%s",
            authDomain: "%s",
            projectId: "%s",
            storageBucket: "%s",
            messagingSenderId: "%s",
            appId: "%s",
            measurementId: "%s"
          };
          </script>""" % (
            clean(os.environ.get('FB_API_KEY', '')),
            clean(os.environ.get('FB_AUTH_DOMAIN', '')),
            clean(os.environ.get('FB_PROJECT_ID', '')),
            clean(os.environ.get('FB_STORAGE_BUCKET', '')),
            clean(os.environ.get('FB_MESSAGING_SENDER_ID', '')),
            clean(os.environ.get('FB_APP_ID', '')),
            clean(os.environ.get('FB_MEASUREMENT_ID', ''))
          )

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Reemplazar el tag del archivo externo por el config inline
          # Buscamos únicamente el script tag (más robusto, sin depender de espacios del comentario)
          old = '<script src="firebase-config.js"></script>'
          if old in content:
              content = content.replace(old, config_script)
              print("✅ Firebase config inyectado correctamente en index.html")
          else:
              print("❌ ERROR: No se encontró el tag de firebase-config.js en index.html")
              exit(1)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
