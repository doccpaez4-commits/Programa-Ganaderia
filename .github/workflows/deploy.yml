name: Desplegar Ganadería Pamora en GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inyectar Firebase config en index.html
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FB_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          config_script = """<script>
          window.FIREBASE_CONFIG = {
            apiKey: "%s",
            authDomain: "%s",
            projectId: "%s",
            storageBucket: "%s",
            messagingSenderId: "%s",
            appId: "%s",
            measurementId: "%s"
          };
          </script>""" % (
            os.environ['FB_API_KEY'],
            os.environ['FB_AUTH_DOMAIN'],
            os.environ['FB_PROJECT_ID'],
            os.environ['FB_STORAGE_BUCKET'],
            os.environ['FB_MESSAGING_SENDER_ID'],
            os.environ['FB_APP_ID'],
            os.environ['FB_MEASUREMENT_ID']
          )

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Reemplazar el tag del archivo externo por el config inline
          # Buscamos únicamente el script tag (más robusto, sin depender de espacios del comentario)
          old = '<script src="firebase-config.js"></script>'
          if old in content:
              content = content.replace(old, config_script)
              print("✅ Firebase config inyectado correctamente en index.html")
          else:
              print("❌ ERROR: No se encontró el tag de firebase-config.js en index.html")
              exit(1)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
